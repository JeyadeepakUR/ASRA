version: '3.8'

services:
  sre-agent:
    build: .
    container_name: sre-agent-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=prod
      - LOG_LEVEL=INFO
      - API_KEY_ENABLED=true
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --workers 2
