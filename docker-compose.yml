version: '3.8'

services:
  sre-agent:
    build: .
    container_name: sre-agent-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=dev
      - LOG_LEVEL=INFO
      - API_KEY_ENABLED=false
    restart: always
    volumes:
      # Development convenience: hot reload from local files
      - .:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload

